version: "3.9"

services:
  loan:
    image: loan:latest
    build: .
    restart: unless-stopped
    volumes:
      - loan_public:/var/www/html/public
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:?Set APP_KEY in Portainer env vars}

      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      REDIS_PORT: 6379

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-loan}
      DB_USERNAME: ${DB_USERNAME:-loan}
      DB_PASSWORD: ${DB_PASSWORD:-loan}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    command:
      - /bin/sh
      - -lc
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
            listen 80;
            server_name localhost;
            root /var/www/html/public;

            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";

            index index.php index.html;

            location / {
                try_files $uri $uri/ /index.php?$query_string;
            }

            location ~ \.php$ {
                include fastcgi_params;
                fastcgi_pass loan:9000;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                fastcgi_hide_header X-Powered-By;
            }

            location ~ /\.ht {
                deny all;
            }

            location ~ /\.(?!well-known).* {
                deny all;
            }

            error_log  /var/log/nginx/error.log;
            access_log /var/log/nginx/access.log;
        }
        EOF
        exec nginx -g 'daemon off;'
    volumes:
      - loan_public:/var/www/html/public:ro
    depends_on:
      loan:
        condition: service_started
    networks:
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_DATABASE:-loan}
      MARIADB_USER: ${DB_USERNAME:-loan}
      MARIADB_PASSWORD: ${DB_PASSWORD:-loan}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Optional: run once (start container in Portainer, it exits)
  migrate:
    image: loan:latest
    build: .
    restart: "no"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:?Set APP_KEY in Portainer env vars}

      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      REDIS_PORT: 6379

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-loan}
      DB_USERNAME: ${DB_USERNAME:-loan}
      DB_PASSWORD: ${DB_PASSWORD:-loan}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-lc", "php artisan migrate --force --seed"]
    networks:
      - internal

networks:
  web:
  internal:
    internal: true

volumes:
  db_data:
  loan_public:
